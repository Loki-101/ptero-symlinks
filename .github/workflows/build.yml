name: build
on:
  push:
    branches: [ "main" ]
    paths:
      - "Cargo.toml"
      - "src/main.rs"
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:
permissions:
  contents: write
env:
  CARGO_TERM_COLOR: always
jobs:
  version:
    name: Read version from Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract version
        id: get
        run: |
          ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "tag=v${ver}" >> "$GITHUB_OUTPUT"
  build:
    name: Build ${{ matrix.target }} (release, musl)
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.target }}
      - name: Install cargo-zigbuild
        run: pip install cargo-zigbuild --break-system-packages
      - name: Build (release)
        run: cargo zigbuild --locked --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: symlinks-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/symlinks

  release:
    name: Publish release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Prepare binaries
        run: |
          mkdir staging
          for dir in dist/symlinks-*; do
            target="${dir#dist/symlinks-}"
            mv "$dir/symlinks" "staging/symlinks-${target}"
          done
          rm -rf dist
          mv staging dist
      - name: Ensure release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" -t "$TAG" -n "Automated musl builds — $TAG"
          fi
      - name: Upload binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for bin in dist/symlinks-*; do
            gh release upload "${{ needs.version.outputs.tag }}" "$bin" --clobber
          done





