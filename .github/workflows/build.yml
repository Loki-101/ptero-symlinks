name: build
on:
  push:
    branches: [ "main" ]
    paths:
      - "Cargo.toml"
      - "src/main.rs"
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:
permissions:
  contents: write
env:
  CARGO_TERM_COLOR: always
jobs:
  version:
    name: Read version from Cargo.toml
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract version
        id: get
        run: |
          ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "tag=v${ver}" >> "$GITHUB_OUTPUT"
  build:
    name: Build ${{ matrix.target }} (release, musl)
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
      - name: Cross-compile (release)
        uses: houseabsolute/actions-rust-cross@v1
        with:
          toolchain: 1.94.0
          target: ${{ matrix.target }}
          command: build
          args: --locked --release
          use-rust-cache: true
      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/symlinks dist/symlinks-${{ matrix.target }}
      - name: Ensure release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" -t "$TAG" -n "Automated musl builds — $TAG"
          fi
      - name: Publish to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.version.outputs.tag }}" dist/symlinks-${{ matrix.target }} --clobber

